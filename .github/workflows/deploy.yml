name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Build Docker image and push to ghcr.io ──────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── Job 2: Deploy to Minikube via self-hosted runner on your Windows PC ─────
  deploy:
    runs-on: self-hosted          # your Windows machine with minikube + kubectl
    needs: build-and-push         # waits for image to be pushed first
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        shell: pwsh          # PowerShell Core — works on Windows self-hosted runners

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Minikube if not running
        shell: pwsh
        run: |
          $status = minikube status --format='{{.Host}}' 2>$null
          if ($status -ne "Running") {
            minikube start --driver=docker --memory=2048 --cpus=2
          } else {
            Write-Host "Minikube already running."
          }

      - name: Log in to ghcr.io inside Minikube daemon
        shell: pwsh
        run: |
          & minikube -p minikube docker-env --shell powershell | Invoke-Expression
          Write-Output "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image into Minikube daemon
        shell: pwsh
        run: |
          & minikube -p minikube docker-env --shell powershell | Invoke-Expression
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
          docker tag  ghcr.io/${{ env.IMAGE_NAME }}:latest shyaway-dashboard:local

      - name: Apply Kubernetes manifests
        shell: pwsh
        run: |
          kubectl apply -f k8s/deployment-local.yaml
          kubectl apply -f k8s/service-nodeport.yaml

      - name: Rollout restart (zero-downtime redeploy)
        shell: pwsh
        run: |
          kubectl rollout restart deployment/shyaway-dashboard
          kubectl rollout status  deployment/shyaway-dashboard --timeout=120s

      - name: Show running pods
        shell: pwsh
        run: kubectl get pods -l app=shyaway-dashboard -o wide
