apiVersion: apps/v1
kind: Deployment
metadata:
  name: shyaway-dashboard
  labels:
    app: shyaway-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shyaway-dashboard
  template:
    metadata:
      labels:
        app: shyaway-dashboard
    spec:
      containers:
        - name: shyaway-dashboard
          image: ghcr.io/kgcarthick/project-shyaway:latest
          ports:
            - containerPort: 8501
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: shyaway-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: shyaway-secrets
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shyaway-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shyaway-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: shyaway-secrets
                  key: DB_NAME
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 5
